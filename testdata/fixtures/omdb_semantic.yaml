domain:
  name: omdb
  description: >
    Open movie database domain covering films, cast and crew credits,
    and box-office financials. The primary grain is one film per row in
    the movies table; each person-to-film credit is one row in casts.
  key_concepts:
    - box office revenue
    - production budget
    - cast and crew credits
  known_gotchas:
    - "The casts table stores both cast (actors) and crew (directors, producers, etc.) — there is no separate crew table"
    - "revenue and budget are in USD; NULL means the figure was not reported publicly"
  provenance:
    source_type: llm_inferred
    confidence: 0.85
    human_reviewed: false

